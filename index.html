<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hemp Radar</title>
<link rel="icon" href="https://github.com/leafcheif/leafcheif.github.io/raw/refs/heads/main/favicon.ico" type="image/x-icon"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme:{
    extend:{
      colors:{ primary:'#22c55e' }
    }
  }
}
</script>

<style>
.card-hover:hover{
  transform:translateY(-4px);
  box-shadow:0 0 0 1px #22c55e33,0 10px 25px rgba(0,0,0,0.6);
}
.copy-box:hover .copy-hint{
  opacity:1;
  transform:translateY(0);
}
.copy-hint{
  opacity:0;
  transform:translateY(4px);
  transition:all .2s ease;
}
.toast{
  animation:toastIn .25s ease;
}
@keyframes toastIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body class="bg-neutral-950 text-white min-h-screen">

<header class="border-b border-neutral-800">
  <div class="max-w-6xl mx-auto px-6 py-8 flex items-center gap-4">
    <img src="https://github.com/leafcheif/leafcheif.github.io/blob/main/banner.png?raw=true" alt="Hemp Radar Logo" class="h-20 w-auto object-contain"/>
    <div>
      <h1 class="text-4xl font-bold tracking-tight">Hemp Radar</h1>
      <p class="text-neutral-400 mt-1">Compare reputable brands. Find verified discount codes. Save money.</p>
    </div>
  </div>
</header>

<section class="max-w-6xl mx-auto px-6 py-8">
<div class="flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">

<input id="searchInput" type="text" placeholder="Search brands..." class="w-full md:w-1/3 bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary transition"/>

<select id="sortSelect" class="bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
  <option value="default">Sort: Default</option>
  <option value="discount">Sort: Highest Discount</option>
  <option value="az">Sort: A → Z</option>
</select>

<div id="categoryButtons" class="flex gap-2 flex-wrap"></div>

</div>
</section>

<main class="max-w-6xl mx-auto px-6 pb-16">
  <div id="brandGrid" class="grid md:grid-cols-3 gap-6"></div>
</main>

<footer class="border-t border-neutral-800">
<div class="max-w-6xl mx-auto px-6 py-6 text-xs text-neutral-500">
<p>Disclaimer: This site may contain affiliate links. You must be 21+ to purchase hemp-derived products. Check your local laws before ordering.</p>
</div>
</footer>

<div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50"></div>

<script>
let brandData=[]
let currentCategory="All"

const searchInput=document.getElementById("searchInput")
const brandGrid=document.getElementById("brandGrid")
const categoryButtons=document.getElementById("categoryButtons")
const toastContainer=document.getElementById("toastContainer")
const sortSelect=document.getElementById("sortSelect")

searchInput.addEventListener("input", renderBrands)
sortSelect.addEventListener("change", renderBrands)

async function loadBrands(){
  try{
    const response=await fetch("https://raw.githubusercontent.com/leafcheif/leafcheif.github.io/main/list.json?v="+Date.now())
    brandData=await response.json()
    generateCategories()
    renderBrands()
  } catch(error){
    brandGrid.innerHTML="<p class='text-red-500'>We're experiencing technical difficulties.</p>"
    console.error(error)
  }
}

function generateCategories(){
  const categories=["All",...new Set(brandData.map(b=>b.category))]
  categoryButtons.innerHTML=""
  categories.forEach(category=>{
    const btn=document.createElement("button")
    btn.textContent=category
    btn.className=category==="All"?"bg-primary text-black px-4 py-2 rounded-xl font-medium":"bg-neutral-800 px-4 py-2 rounded-xl hover:bg-neutral-700 transition"
    btn.onclick=()=>{
      currentCategory=category
      document.querySelectorAll("#categoryButtons button").forEach(b=>{
        b.classList.remove("bg-primary","text-black")
        b.classList.add("bg-neutral-800")
      })
      btn.classList.remove("bg-neutral-800")
      btn.classList.add("bg-primary","text-black")
      renderBrands()
    }
    categoryButtons.appendChild(btn)
  })
}

function showToast(message){
  const toast=document.createElement("div")
  toast.className="toast bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden shadow-xl w-80 text-center"
  toast.innerHTML=`<div class="p-4 text-sm">${message}</div><div class="h-1 bg-primary w-full toast-bar"></div>`
  toastContainer.appendChild(toast)
  const bar=toast.querySelector(".toast-bar")
  bar.style.transition="width 3s linear"
  setTimeout(()=>{bar.style.width="0%"},50)
  setTimeout(()=>{toast.remove()},3000)
}

function copyCode(code){
  navigator.clipboard.writeText(code)
  showToast("Coupon code copied")
}

function renderBrands(){
  const searchValue=searchInput.value.toLowerCase()
  let filtered=brandData.filter(brand=>{
    const matchesSearch=brand.name.toLowerCase().includes(searchValue)
    const matchesCategory=currentCategory==="All" || brand.category===currentCategory
    return matchesSearch && matchesCategory
  })

  if(sortSelect.value==="az") filtered.sort((a,b)=>a.name.localeCompare(b.name))
  if(sortSelect.value==="discount") filtered.sort((a,b)=>{const getNum=d=>parseInt(d?.replace(/\D/g,''))||0; return getNum(b.discount)-getNum(a.discount)})

  brandGrid.innerHTML=""
  if(filtered.length===0){
    brandGrid.innerHTML="<p class='text-neutral-400'>No brands found.</p>"
    return
  }

  filtered.forEach(brand=>{
    const card=document.createElement("div")
    card.className="card-hover bg-neutral-900 border border-neutral-800 rounded-2xl p-6 space-y-4 transition duration-300"
    card.innerHTML=`
      <div class="flex items-center gap-3">
        <img src="${brand.logo || 'https://www.clker.com/cliparts/j/u/p/E/j/x/weed-md.png'}" class="w-10 h-10 rounded-lg object-contain bg-neutral-800 p-1"/>
        <div class="flex justify-between w-full items-center">
          <h2 class="text-xl font-semibold">${brand.name}</h2>
          ${brand.discount ? `<span class="bg-primary text-black text-xs font-bold px-2 py-1 rounded">${brand.discount}</span>` : ``}
        </div>
      </div>

      <p class="text-neutral-400 text-sm">${brand.description}</p>

      <div onclick="copyCode('${brand.code}')" class="copy-box relative bg-neutral-800 rounded-xl py-3 px-3 text-center cursor-pointer hover:bg-neutral-700 transition" title="Click to copy code">
        <p class="text-xs text-neutral-400 leading-tight">Discount Code</p>
        <p class="text-lg font-mono font-bold tracking-widest leading-tight mt-1">${brand.code}</p>
        <p class="copy-hint absolute bottom-1 left-1/2 -translate-x-1/2 text-[11px] text-neutral-500 pointer-events-none">Click to copy</p>
      </div>

      <a href="${brand.url}" target="_blank" onclick="copyCode('${brand.code}')" class="block text-center bg-primary text-black py-3 rounded-xl font-semibold hover:opacity-90 transition">
        Visit Site
      </a>
    `
    brandGrid.appendChild(card)
  })
}

loadBrands()
setInterval(loadBrands,60000)
</script>

</body>
</html>
