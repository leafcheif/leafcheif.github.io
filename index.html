<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hemp Radar</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#22c55e'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-neutral-950 text-white min-h-screen">

  <!-- Header -->
  <header class="border-b border-neutral-800">
    <div class="max-w-6xl mx-auto px-6 py-8 flex items-center gap-4">

      <!-- Logo -->
      <img 
        src="https://github.com/leafcheif/leafcheif.github.io/blob/main/banner.png?raw=true"
        alt="Hemp Radar Logo"
        class="h-20 w-auto object-contain"
      />

      <!-- Text -->
      <div>
        <h1 class="text-4xl font-bold tracking-tight">
          Hemp Radar
        </h1>
        <p class="text-neutral-400 mt-1">
          Compare reputable brands. Find verified discount codes. Save money.
        </p>
      </div>

    </div>
  </header>

  <!-- Controls -->
  <section class="max-w-6xl mx-auto px-6 py-8">
    <div class="flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
      
      <input 
        id="searchInput"
        type="text" 
        placeholder="Search brands..."
        class="w-full md:w-1/3 bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary"
      />

      <div id="categoryButtons" class="flex gap-2 flex-wrap">
        <!-- Categories auto-generate -->
      </div>

    </div>
  </section>

  <!-- Brand Grid -->
  <main class="max-w-6xl mx-auto px-6 pb-16">
    <div id="brandGrid" class="grid md:grid-cols-3 gap-6">
      <!-- Cards auto-generate -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-neutral-800">
    <div class="max-w-6xl mx-auto px-6 py-6 text-xs text-neutral-500">
      <p>
        Disclaimer: This site may contain affiliate links. You must be 21+ to purchase hemp-derived products. Check your local laws before ordering.
      </p>
    </div>
  </footer>

<script>
let brandData = [];
let currentCategory = "All";

const searchInput = document.getElementById("searchInput");
const brandGrid = document.getElementById("brandGrid");
const categoryButtons = document.getElementById("categoryButtons");

searchInput.addEventListener("input", renderBrands);

async function loadBrands() {
  try {
    // <-- Replace this URL with your raw online JSON file
    const response = await fetch("https://rawcdn.githack.com/leafcheif/leafcheif.github.io/main/list.json");
    brandData = await response.json();
    generateCategories();
    renderBrands();
  } catch (error) {
    brandGrid.innerHTML = "<p class='text-red-500'>We're experiencing technical difficulties at this time, check back later. Sorry!</p>";
    console.error(error);
  }
}

function generateCategories() {
  const categories = ["All", ...new Set(brandData.map(b => b.category))];
  categoryButtons.innerHTML = "";

  categories.forEach(category => {
    const btn = document.createElement("button");
    btn.textContent = category;
    btn.className = category === "All"
      ? "bg-primary text-black px-4 py-2 rounded-xl font-medium"
      : "bg-neutral-800 px-4 py-2 rounded-xl";

    btn.onclick = () => {
      currentCategory = category;
      document.querySelectorAll("#categoryButtons button").forEach(b => {
        b.classList.remove("bg-primary", "text-black");
        b.classList.add("bg-neutral-800");
      });
      btn.classList.remove("bg-neutral-800");
      btn.classList.add("bg-primary", "text-black");
      renderBrands();
    };

    categoryButtons.appendChild(btn);
  });
}

function renderBrands() {
  const searchValue = searchInput.value.toLowerCase();
  brandGrid.innerHTML = "";

  const filtered = brandData.filter(brand => {
    const matchesSearch = brand.name.toLowerCase().includes(searchValue);
    const matchesCategory = currentCategory === "All" || brand.category === currentCategory;
    return matchesSearch && matchesCategory;
  });

  if (filtered.length === 0) {
    brandGrid.innerHTML = "<p class='text-neutral-400'>No brands found.</p>";
    return;
  }

  filtered.forEach(brand => {
    const card = document.createElement("div");
    card.className = "bg-neutral-900 border border-neutral-800 rounded-2xl p-6 space-y-4 hover:border-primary transition";

    card.innerHTML = `
      <h2 class="text-xl font-semibold">${brand.name}</h2>
      <p class="text-neutral-400 text-sm">${brand.description}</p>

      <div class="bg-neutral-800 rounded-xl p-3 text-center">
        <p class="text-sm text-neutral-400">Discount Code</p>
        <p class="text-lg font-bold tracking-widest">${brand.code}</p>
      </div>

      <a href="${brand.url}" target="_blank"
        class="block text-center bg-primary text-black py-3 rounded-xl font-semibold hover:opacity-90 transition">
        Visit Site
      </a>
    `;

    brandGrid.appendChild(card);
  });
}

loadBrands();
</script>

</body>
</html>
